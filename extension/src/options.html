<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nodebyte Extension Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #1a1a2e;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 480px; width: 100%; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }

    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }

    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #fff;
    }
    .field input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .field .hint { font-size: 11px; color: #9ca3af; margin-top: 3px; }

    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 13px; }
    .info-row + .info-row { border-top: 1px solid #f3f4f6; }
    .info-label { color: #6b7280; }
    .info-value { font-weight: 600; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #2d2d4a; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }

    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
    .msg-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .msg-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nodebyte Settings</h1>
    <p class="subtitle">Configure your extension connection.</p>

    <div id="msg" class="msg hidden"></div>

    <div class="card">
      <h2>API Connection</h2>
      <div class="field">
        <label for="api-url">Server URL</label>
        <input type="url" id="api-url" placeholder="http://localhost:8000" />
        <div class="hint">The base URL of your Nodebyte backend (no trailing slash).</div>
      </div>
    </div>

    <div class="card" id="account-card">
      <h2>Account</h2>
      <div class="info-row">
        <span class="info-label">Signed in as</span>
        <span class="info-value" id="account-email">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Active team</span>
        <span class="info-value" id="account-team">—</span>
      </div>
      <div class="hint" style="margin-top:8px">Switch teams directly from the extension popup.</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="btn-save">Save Settings</button>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="options.js"></script>
</body>
</html>
